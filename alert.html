<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>IP Changed!</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a0a2e 0%, #16213e 50%, #0f3460 100%);
      color: #fff;
      overflow: hidden;
    }
    .alert-box {
      text-align: center;
      padding: 40px 50px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 20px;
      backdrop-filter: blur(20px);
      box-shadow: 0 0 60px rgba(239, 68, 68, 0.15), 0 20px 60px rgba(0,0,0,0.3);
      animation: slideIn 0.3s ease-out;
    }
    @keyframes slideIn {
      from { transform: scale(0.8) translateY(20px); opacity: 0; }
      to { transform: scale(1) translateY(0); opacity: 1; }
    }
    .warning-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 20px;
      background: rgba(239, 68, 68, 0.15);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
      50% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
    }
    .warning-icon svg { width: 32px; height: 32px; color: #ef4444; }
    h1 {
      font-size: 22px;
      margin-bottom: 8px;
      color: #f87171;
      font-weight: 700;
    }
    .subtitle {
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 28px;
    }
    .ip-change {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 28px;
    }
    .ip-box {
      padding: 12px 20px;
      border-radius: 10px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 16px;
      font-weight: 600;
    }
    .ip-old {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #fca5a5;
      text-decoration: line-through;
    }
    .arrow {
      font-size: 24px;
      color: #64748b;
    }
    .ip-new {
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: #86efac;
    }
    .timestamp {
      font-size: 11px;
      color: #475569;
      margin-bottom: 24px;
    }
    .btn-dismiss {
      padding: 12px 36px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-dismiss:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4);
    }
    .btn-dismiss:active { transform: scale(0.97); }
  </style>
</head>
<body>
  <div class="alert-box">
    <div class="warning-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
        <line x1="12" y1="9" x2="12" y2="13"/>
        <line x1="12" y1="17" x2="12.01" y2="17"/>
      </svg>
    </div>
    <h1>Your IP Address Changed!</h1>
    <p class="subtitle">A change in your public IP was detected</p>
    <div class="ip-change">
      <div class="ip-box ip-old" id="oldIP">—</div>
      <span class="arrow">→</span>
      <div class="ip-box ip-new" id="newIP">—</div>
    </div>
    <p class="timestamp" id="changeTime"></p>
    <button class="btn-dismiss" id="dismissBtn">Got it</button>
  </div>

  <script src="alert.js"></script>
</body>
</html>
