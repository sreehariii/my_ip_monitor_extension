<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IP Monitor</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.5"/>
          <path d="M2 12h20M12 2c2.5 2.5 4 5.5 4 10s-1.5 7.5-4 10c-2.5-2.5-4-5.5-4-10s1.5-7.5 4-10z" stroke="currentColor" stroke-width="1.5"/>
        </svg>
      </div>
      <h1>IP Monitor</h1>
    </div>

    <div class="ip-card">
      <span class="label">Current IP</span>
      <span class="ip-address" id="currentIP">Loading...</span>
      <span class="last-check" id="lastCheck"></span>
    </div>

    <div class="status-bar" id="statusBar">
      <span class="status-dot"></span>
      <span class="status-text" id="statusText">Monitoring</span>
    </div>

    <div class="actions">
      <button id="refreshBtn" class="btn-refresh" title="Check now">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M1 4v6h6M23 20v-6h-6"/>
          <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/>
        </svg>
        Check Now
      </button>
    </div>

    <div class="settings-section">
      <h2>Check Interval</h2>
      <div class="interval-control">
        <input type="number" id="intervalInput" min="1" max="1440" value="10">
        <span class="interval-unit">minutes</span>
        <button id="saveIntervalBtn" class="btn-save">Save</button>
      </div>
    </div>

    <div class="history-section">
      <h2>Change History</h2>
      <div id="historyList" class="history-list">
        <p class="empty-state">No changes detected yet</p>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
